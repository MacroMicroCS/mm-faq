<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}客服系統{% endblock %} — MacroMicro</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/tickets/static/tickets/tickets.css">
</head>
<body class="ticket-layout">
    <div class="ticket-sidebar">
        <a href="/" class="sidebar-logo">
            <img src="/static/logo.svg" alt="MacroMicro" class="logo-img">
        </a>
        <nav class="sidebar-nav">
            <a href="/tickets/inbox" class="sidebar-link {% if request.url.path.startswith('/tickets/inbox') or request.url.path == '/tickets/' %}active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                收件匣
            </a>
            <a href="/tickets/templates" class="sidebar-link {% if '/templates' in request.url.path %}active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                回覆模板
            </a>
            <a href="/tickets/customers" class="sidebar-link {% if '/customers' in request.url.path %}active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                客戶
            </a>
            <a href="/tickets/reports" class="sidebar-link {% if '/reports' in request.url.path %}active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                報表
            </a>
            {% if agent and agent.role == 'admin' %}
            <a href="/tickets/settings" class="sidebar-link {% if '/settings' in request.url.path %}active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                設定
            </a>
            {% endif %}
        </nav>
        <div class="sidebar-footer">
            {% if agent %}
            <span class="agent-name">{{ agent.name }}</span>
            <form action="/tickets/logout" method="post" style="display:inline">
                <button type="submit" class="logout-btn">登出</button>
            </form>
            {% endif %}
        </div>
    </div>
    <div class="ticket-main">
        {% block content %}{% endblock %}
    </div>
    <script src="/tickets/static/tickets/tickets.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
