<!DOCTYPE html>
<html lang="{{ locale }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MacroMicro FAQ{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="/?locale={{ locale }}" class="logo"><img src="/static/logo.svg" alt="MacroMicro" class="logo-img"></a>
            <div class="nav-right">
                <form class="search-form" action="/search" method="get">
                    <input type="hidden" name="locale" value="{{ locale }}">
                    <input type="text" name="q" placeholder="{% if locale == 'en' %}Search FAQ...{% elif locale == 'zh-cn' %}жђњзґў FAQ...{% else %}жђње°‹ FAQ...{% endif %}" value="{{ query|default('') }}">
                    <button type="submit">{% if locale == 'en' %}Search{% elif locale == 'zh-cn' %}жђњзґў{% else %}жђње°‹{% endif %}</button>
                </form>
                <div class="locale-switcher">
                    {% for loc, name in locale_names.items() %}
                    <a href="{{ request.url.path }}?{% if request.query_params %}{% for k, v in request.query_params.items() %}{% if k != 'locale' %}{{ k }}={{ v }}&{% endif %}{% endfor %}{% endif %}locale={{ loc }}" class="{% if locale == loc %}active{% endif %}">{{ name }}</a>
                    {% endfor %}
                </div>
            </div>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>MacroMicro FAQ System</p>
    </footer>
</body>
</html>
