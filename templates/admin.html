<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ Admin</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .drag-handle { cursor: grab; color: #aaa; padding: 0 4px; user-select: none; font-size: 1rem; }
        .drag-handle:active { cursor: grabbing; }
        tr.dragging { opacity: 0.4; }
        tr.drag-over { border-top: 2px solid var(--mm-primary); }
        #save-order-btn { display: none; padding: 8px 20px; background: var(--mm-blue); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; margin-left: 12px; }
        #save-order-btn.visible { display: inline-block; }
        #save-order-btn:hover { background: var(--mm-prime); }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="/" class="logo">MacroMicro FAQ</a>
            <div class="nav-right">
                <a href="/admin" class="admin-link active">Admin</a>
            </div>
        </nav>
    </header>
    <main>
        <div class="admin-page">
            <h1>FAQ 管理後台</h1>
            <div class="admin-filters" style="align-items:center;">
                <select id="filter-status">
                    <option value="all">全部狀態</option>
                    <option value="published" selected>已上架</option>
                    <option value="draft">草稿</option>
                    <option value="archived">已下架</option>
                </select>
                <select id="filter-category">
                    <option value="all">全部類別</option>
                </select>
                <select id="filter-section">
                    <option value="all">全部段落</option>
                </select>
                <button id="save-order-btn" onclick="saveOrder()">💾 儲存排序</button>
            </div>
            <table class="admin-table">
                <thead>
                    <tr>
                        <th style="width:32px"></th>
                        <th>ID</th>
                        <th>類別</th>
                        <th>段落</th>
                        <th>標題</th>
                        <th>狀態</th>
                        <th>繁中</th>
                        <th>簡中</th>
                        <th>EN</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="faq-table-body">
                </tbody>
            </table>
        </div>
    </main>
    <script>
    let faqs = {{ faqs | tojson }};
    let orderChanged = false;
    let currentFiltered = [];

    // Populate category filter
    const cats = [...new Set(faqs.map(f => f.category))].sort();
    const catSelect = document.getElementById('filter-category');
    cats.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c; opt.textContent = c;
        catSelect.appendChild(opt);
    });

    function updateSectionFilter() {
        const catFilter = document.getElementById('filter-category').value;
        const secSelect = document.getElementById('filter-section');
        const currentSec = secSelect.value;
        secSelect.innerHTML = '<option value="all">全部段落</option>';
        const sections = [...new Set(faqs
            .filter(f => catFilter === 'all' || f.category === catFilter)
            .map(f => f.section))].sort();
        sections.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s; opt.textContent = s;
            secSelect.appendChild(opt);
        });
        if (sections.includes(currentSec)) secSelect.value = currentSec;
    }

    function render() {
        const statusFilter = document.getElementById('filter-status').value;
        const catFilter = document.getElementById('filter-category').value;
        const secFilter = document.getElementById('filter-section').value;
        const tbody = document.getElementById('faq-table-body');
        tbody.innerHTML = '';
        orderChanged = false;
        document.getElementById('save-order-btn').classList.remove('visible');

        currentFiltered = faqs.filter(f => {
            if (statusFilter !== 'all' && f.status !== statusFilter) return false;
            if (catFilter !== 'all' && f.category !== catFilter) return false;
            if (secFilter !== 'all' && f.section !== secFilter) return false;
            return true;
        }).sort((a, b) => (a.order || 0) - (b.order || 0));

        currentFiltered.forEach(faq => {
            const tr = document.createElement('tr');
            tr.dataset.id = faq.id;
            tr.draggable = true;
            tr.innerHTML = `
                <td><span class="drag-handle" title="拖拉排序">⠿</span></td>
                <td>${faq.id}</td>
                <td>${faq.category}</td>
                <td>${faq.section}</td>
                <td><a href="/faq/${faq.id}" target="_blank">${faq.title['zh-tw'] || ''}</a></td>
                <td>
                    <select class="status-select" data-id="${faq.id}" onchange="updateStatus('${faq.id}', this.value)">
                        <option value="published" ${faq.status === 'published' ? 'selected' : ''}>已上架</option>
                        <option value="draft" ${faq.status === 'draft' ? 'selected' : ''}>草稿</option>
                        <option value="archived" ${faq.status === 'archived' ? 'selected' : ''}>已下架</option>
                    </select>
                </td>
                <td><input type="checkbox" ${faq.locales['zh-tw'] ? 'checked' : ''} disabled></td>
                <td><input type="checkbox" ${faq.locales['zh-cn'] ? 'checked' : ''} onchange="updateLocale('${faq.id}', 'zh-cn', this.checked)"></td>
                <td><input type="checkbox" ${faq.locales['en'] ? 'checked' : ''} onchange="updateLocale('${faq.id}', 'en', this.checked)"></td>
                <td><a href="/admin/edit/${faq.id}">編輯</a> | <a href="/faq/${faq.id}" target="_blank">預覽</a></td>
            `;
            tbody.appendChild(tr);
        });
        initDragDrop();
    }

    // Drag-and-drop
    let dragSrc = null;
    function initDragDrop() {
        const rows = document.querySelectorAll('#faq-table-body tr');
        rows.forEach(row => {
            row.addEventListener('dragstart', e => {
                dragSrc = row;
                row.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
            });
            row.addEventListener('dragend', () => {
                row.classList.remove('dragging');
                document.querySelectorAll('#faq-table-body tr').forEach(r => r.classList.remove('drag-over'));
            });
            row.addEventListener('dragover', e => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                document.querySelectorAll('#faq-table-body tr').forEach(r => r.classList.remove('drag-over'));
                if (row !== dragSrc) row.classList.add('drag-over');
            });
            row.addEventListener('drop', e => {
                e.preventDefault();
                if (dragSrc && row !== dragSrc) {
                    const tbody = document.getElementById('faq-table-body');
                    const rows = [...tbody.querySelectorAll('tr')];
                    const srcIdx = rows.indexOf(dragSrc);
                    const tgtIdx = rows.indexOf(row);
                    if (srcIdx < tgtIdx) {
                        tbody.insertBefore(dragSrc, row.nextSibling);
                    } else {
                        tbody.insertBefore(dragSrc, row);
                    }
                    orderChanged = true;
                    document.getElementById('save-order-btn').classList.add('visible');
                }
                row.classList.remove('drag-over');
            });
        });
    }

    async function saveOrder() {
        const rows = [...document.querySelectorAll('#faq-table-body tr')];
        const ids = rows.map(r => r.dataset.id);
        const res = await fetch('/api/reorder', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ids})
        });
        if (res.ok) {
            // Update local order
            ids.forEach((id, idx) => {
                const faq = faqs.find(f => f.id === id);
                if (faq) faq.order = idx + 1;
            });
            orderChanged = false;
            document.getElementById('save-order-btn').classList.remove('visible');
            alert('排序已儲存！');
        }
    }

    async function updateStatus(id, status) {
        const res = await fetch(`/api/faq/${id}/status`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({status})
        });
        if (res.ok) {
            const faq = faqs.find(f => f.id === id);
            if (faq) faq.status = status;
        }
    }

    async function updateLocale(id, locale, enabled) {
        const res = await fetch(`/api/faq/${id}/locales`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({locales: {[locale]: enabled}})
        });
        if (res.ok) {
            const faq = faqs.find(f => f.id === id);
            if (faq) faq.locales[locale] = enabled;
        }
    }

    document.getElementById('filter-status').addEventListener('change', render);
    document.getElementById('filter-category').addEventListener('change', () => { updateSectionFilter(); render(); });
    document.getElementById('filter-section').addEventListener('change', render);
    render();
    </script>
</body>
</html>
